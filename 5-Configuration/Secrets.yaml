# ============================================================
# Kubernetes Secrets - Learning Reference
# ============================================================
# A Secret stores sensitive data (passwords, tokens, keys).
# Values are base64-encoded (NOT encrypted by default).
#
# IMPORTANT SECURITY NOTES:
#   - base64 is encoding, NOT encryption. Anyone with access to #     the API server can decode secret values.
#   - Enable Encryption at Rest (EncryptionConfiguration) in production.
#   - Use external secret managers in production:
#       AWS Secrets Manager + External Secrets Operator
#       Azure Key Vault + Secrets Store CSI Driver
#       HashiCorp Vault + Vault Agent Injector
#
# Secret types:
#   Opaque                     – arbitrary user-defined data (default)
#   kubernetes.io/basic-auth   – username & password
#   kubernetes.io/ssh-auth     – SSH private key
#   kubernetes.io/tls          – TLS certificate and key
#   kubernetes.io/dockerconfigjson – Docker registry credentials
#   kubernetes.io/service-account-token – service account token
# ============================================================


# ------------------------------------------------------------
# 1. Opaque Secret (generic / arbitrary data), Values MUST be base64-encoded in the `data` field. Or use `stringData` for plain text (k8s encodes automatically).
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: default
  labels:
    app: my-app
type: Opaque
# Use stringData for plain text – k8s base64-encodes it automatically
stringData:
  username: "admin"
  password: "S3cur3P@ssw0rd!"
  db-url: "postgresql://admin:S3cur3P@ssw0rd!@postgres:5432/appdb"

---
# Same secret using base64-encoded `data` field
# echo -n "admin" | base64  → YWRtaW4=
# echo -n "S3cur3P@ssw0rd!" | base64  → UzNjdXIzUEBzc3cwcmQh
apiVersion: v1
kind: Secret
metadata:
  name: db-secret-b64
  namespace: default
type: Opaque
data:
  username: YWRtaW4=             # echo -n "admin" | base64
  password: UzNjdXIzUEBzc3cwcmQh # echo -n "S3cur3P@ssw0rd!" | base64

---
# ------------------------------------------------------------
# 2. TLS Secret
#    Stores a TLS certificate and private key.
#    Used by Ingress controllers for HTTPS termination.
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
  namespace: default
type: kubernetes.io/tls
data:
  # base64-encoded TLS certificate (PEM format)
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...   # truncated
  # base64-encoded private key (PEM format)
  tls.key: LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVkt...   # truncated

# Create from files:
#   kubectl create secret tls tls-secret \
#     --cert=tls.crt --key=tls.key

---
# ------------------------------------------------------------
# 3. Docker Registry Secret (pull private images)
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: default
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJyZWdpc3RyeS5leGFtcGxlLmNvbSI6eyJ1c2VybmFtZSI6InVzZXIiLCJwYXNzd29yZCI6InBhc3MiLCJhdXRoIjoiZFhObGNqcHdZWE56In19fQ==

# Create from Docker login credentials:
#   kubectl create secret docker-registry registry-secret \
#     --docker-server=registry.example.com \
#     --docker-username=user \
#     --docker-password=pass \
#     --docker-email=user@example.com

---
# ------------------------------------------------------------
# 4. Basic Auth Secret
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-secret
  namespace: default
type: kubernetes.io/basic-auth
stringData:
  username: "admin"
  password: "admin123"

---
# ------------------------------------------------------------
# 5. SSH Auth Secret
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: ssh-key-secret
  namespace: default
type: kubernetes.io/ssh-auth
data:
  ssh-privatekey: LS0tLS1CRUdJTiBPUEVOU1NIIFBSSVZBVEUgS0VZLS0tLS0...  # truncated

# Create from file:
#   kubectl create secret generic ssh-key-secret \
#     --from-file=ssh-privatekey=~/.ssh/id_rsa \
#     --type kubernetes.io/ssh-auth

---
# ------------------------------------------------------------
# 6. Pod consuming Secret as environment variables
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: pod-secret-env
  namespace: default
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo DB_USER=$DB_USER && sleep 3600"]
      env:
        # 6a. Single key from Secret
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
      # 6b. All keys from a Secret as env vars
      envFrom:
        - secretRef:
            name: db-secret
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"
  restartPolicy: Never

---
# ------------------------------------------------------------
# 7. Pod consuming Secret as a Volume (mounted as files) Best practice: mount only what you need using `items`. Files are created with mode 0644 by default.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: pod-secret-volume
  namespace: default
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "cat /etc/secrets/password && sleep 3600"]
      volumeMounts:
        - name: secret-vol
          mountPath: /etc/secrets
          readOnly: true             # always mount secrets read-only
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

  volumes:
    - name: secret-vol
      secret:
        secretName: db-secret
        defaultMode: 0400          # restrict to owner-read only
        # Optionally mount specific keys only:
        items:
          - key: password
            path: password         # file name inside mountPath
          - key: username
            path: username

  restartPolicy: Never

---
# ------------------------------------------------------------
# 8. Pod using imagePullSecrets (pull from private registry)
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-image
  namespace: default
spec:
  imagePullSecrets:
    - name: registry-secret       # references the docker-registry Secret
  containers:
    - name: app
      image: registry.example.com/myapp:1.0.0
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

---
# ------------------------------------------------------------
# 9. Immutable Secret (k8s 1.21+)
#    Prevents accidental updates; better kubelet performance.
# ------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: immutable-secret
  namespace: default
type: Opaque
immutable: true
stringData:
  api-key: "super-secret-api-key-12345"

---
# ------------------------------------------------------------
# Useful kubectl commands for Secrets
# ------------------------------------------------------------
# Create from literals:
#   kubectl create secret generic db-secret \
#     --from-literal=username=admin \
#     --from-literal=password=S3cur3P@ssw0rd!
#
# Create from file:
#   kubectl create secret generic app-secret --from-file=./secrets/
#
# Create TLS secret from cert files:
#   kubectl create secret tls tls-secret --cert=cert.pem --key=key.pem
#
# View secrets (shows names but NOT decoded values):
#   kubectl get secrets
#   kubectl describe secret db-secret
#
# Decode a secret value:
#   kubectl get secret db-secret -o jsonpath='{.data.password}' | base64 -d
#
# Edit a secret:
#   kubectl edit secret db-secret
#
# Delete:
#   kubectl delete secret db-secret
#
# ---
# Production best practice: Use External Secrets Operator
#   https://external-secrets.io
#   Syncs secrets from AWS SM / Azure KV / HashiCorp Vault
#   into native k8s Secrets automatically.
