# ============================================================
# Kubernetes Resource Management - Learning Reference
# ============================================================
# Resources are CPU and memory allocated to containers.
#
# Two key fields per container:
#   requests – what the container is guaranteed (used for scheduling)
#   limits   – the maximum the container can use (enforced at runtime)
#
# CPU units:
#   1    = 1 CPU core (1000 millicores)
#   500m = 0.5 CPU core
#   100m = 0.1 CPU core (minimum recommended)
#
# Memory units:
#   Ki = kibibytes (1024 bytes)  – K  = kilobytes (1000 bytes)
#   Mi = mebibytes               – M  = megabytes
#   Gi = gibibytes               – G  = gigabytes
#
# What happens when limits are exceeded:
#   CPU:    throttled (slowed down) – container NOT killed
#   Memory: OOMKilled (killed immediately), pod restarts
#
# Quality of Service (QoS) classes:
#   Guaranteed  – requests == limits for both CPU and memory
#   Burstable   – requests < limits (or only one is set)
#   BestEffort  – no requests or limits set (first to be evicted)
# ============================================================


# ------------------------------------------------------------
# 1. Container with requests and limits
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: resource-demo
  namespace: default
  labels:
    app: resource-demo
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      resources:
        requests:
          cpu: "100m"       # scheduler reserves 0.1 CPU core for this pod
          memory: "128Mi"   # scheduler reserves 128 MiB for this pod
        limits:
          cpu: "250m"       # container throttled above 0.25 CPU
          memory: "256Mi"   # container OOMKilled if it exceeds 256 MiB

---
# ------------------------------------------------------------
# 2. Guaranteed QoS – requests == limits
#    Highest priority; last to be evicted under node pressure.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: guaranteed-qos
  namespace: default
  labels:
    qos: guaranteed
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
        limits:
          cpu: "500m"      # same as request → Guaranteed QoS
          memory: "512Mi"  # same as request → Guaranteed QoS

---
# ------------------------------------------------------------
# 3. Burstable QoS – requests < limits
#    Middle priority; evicted before BestEffort gets resources.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: burstable-qos
  namespace: default
  labels:
    qos: burstable
spec:
  containers:
    - name: app
      image: nginx:1.25.3
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "1"         # can burst up to 1 CPU core
          memory: "1Gi"    # can burst up to 1 GiB memory

---
# ------------------------------------------------------------
# 4. BestEffort QoS – no requests or limits
#    Lowest priority; first to be evicted when node is under pressure.
#    Avoid in production.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: besteffort-qos
  namespace: default
  labels:
    qos: besteffort
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      # No resources block → BestEffort QoS

---
# ------------------------------------------------------------
# 5. Multi-container Pod resource management
#    Each container gets its own requests/limits.
#    The Pod's total = sum of all containers.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: multi-container-resources
  namespace: default
spec:
  containers:
    - name: web
      image: nginx:1.25.3
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

    - name: sidecar
      image: fluent/fluentd:v1.16-1
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

    # init container (counted separately during init phase)
  initContainers:
    - name: init
      image: busybox:1.36
      command: ["sh", "-c", "echo init done"]
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

---
# ------------------------------------------------------------
# 6. LimitRange – namespace-level default resource settings
#    When a container has NO resources specified, these defaults apply.
# ------------------------------------------------------------
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: default
spec:
  limits:
    - type: Container
      # Default values injected when container has no limits
      default:
        cpu: "500m"
        memory: "512Mi"
      # Default values injected when container has no requests
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      # Hard ceilings – cannot exceed these per container
      max:
        cpu: "2"
        memory: "4Gi"
      # Hard floors – must request at least these
      min:
        cpu: "50m"
        memory: "64Mi"
      # Limit: request ratio – limits cannot be more than 4x requests
      maxLimitRequestRatio:
        cpu: "4"
        memory: "4"

    - type: Pod
      max:
        cpu: "4"
        memory: "8Gi"

    - type: PersistentVolumeClaim
      max:
        storage: "20Gi"
      min:
        storage: "1Gi"

---
# ------------------------------------------------------------
# 7. ResourceQuota – namespace total resource cap
# ------------------------------------------------------------
apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: default
spec:
  hard:
    # Compute
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    # Object count
    pods: "50"
    services: "20"
    secrets: "30"
    configmaps: "30"
    persistentvolumeclaims: "20"
    # Storage
    requests.storage: "200Gi"

---
# ------------------------------------------------------------
# 8. Deployment with resource requests/limits
#    Best practice for all production workloads.
# ------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: default
  labels:
    app: api-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api
          image: my-api:1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

---
# ------------------------------------------------------------
# 9. Extended Resources – GPUs, custom hardware
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod
  namespace: default
spec:
  containers:
    - name: cuda-app
      image: nvidia/cuda:12.3.0-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: 1    # request 1 GPU (only in limits, not requests)
        requests:
          cpu: "500m"
          memory: "1Gi"
        # limits for GPU must equal requests implicitly

---
# ------------------------------------------------------------
# 10. Ephemeral storage limits
#     Protects nodes from pods consuming too much local disk.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: storage-limit-demo
  namespace: default
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
          ephemeral-storage: "1Gi"   # disk space for container's writable layer + emptyDir
        limits:
          cpu: "250m"
          memory: "256Mi"
          ephemeral-storage: "2Gi"   # evicted if local disk exceeds 2 GiB

---
# ------------------------------------------------------------
# Useful kubectl commands for Resource Management
# ------------------------------------------------------------
# Check current resource usage (requires metrics-server):
#   kubectl top nodes
#   kubectl top pods
#   kubectl top pods -n default --containers
#
# Describe pod to see resource assignments and QoS:
#   kubectl describe pod resource-demo
#   # Look for: QoS Class, Requests, Limits
#
# Check LimitRange:
#   kubectl describe limitrange default-limits
#
# Check ResourceQuota usage:
#   kubectl describe resourcequota namespace-quota
#
# Check what happens after OOMKill:
#   kubectl get pod <pod> -o jsonpath='{.status.containerStatuses[*].lastState}'
#
# Set resources on existing deployment:
#   kubectl set resources deployment api-server \
#     --containers=api \
#     --requests=cpu=250m,memory=512Mi \
#     --limits=cpu=500m,memory=1Gi
