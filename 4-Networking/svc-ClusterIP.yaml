# ============================================================
# Kubernetes Service: ClusterIP - Learning Reference
# ============================================================
# ClusterIP is the DEFAULT service type.
# It creates a virtual IP address accessible ONLY within the cluster. It acts as a stable endpoint (DNS name + IP) in front of pods which may come and go.
#
# DNS format: <service-name>.<namespace>.svc.cluster.local
# Short form:  <service-name>  (within the same namespace)
#
# Use ClusterIP for:
#   - Internal microservice communication
#   - Databases, caches, message brokers
#   - Anything that should NOT be exposed outside the cluster
# ============================================================


# ------------------------------------------------------------
# 1. Basic ClusterIP Service
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: default
  labels:
    app: backend
spec:
  type: ClusterIP               # default; can be omitted
  selector:
    app: backend                # routes traffic to pods with this label
  ports:
    - name: http
      port: 80                  # port exposed on the ClusterIP
      targetPort: 8080          # port on the pod/container
      protocol: TCP

---
# The backing Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: my-backend:1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
# ------------------------------------------------------------
# 2. ClusterIP with multiple ports
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: multi-port-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: my-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
# ------------------------------------------------------------
# 3. ClusterIP using a named targetPort
#    The pod defines a named port; the service references it by name.
#    Allows changing the port number in pods without updating the service.
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: named-port-svc
  namespace: default
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: api-port       # references the named port in the pod spec

---
apiVersion: v1
kind: Pod
metadata:
  name: api-pod
  labels:
    app: api
spec:
  containers:
    - name: api
      image: my-api:1.0.0
      ports:
        - name: api-port         # named port
          containerPort: 8080
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

---
# ------------------------------------------------------------
# 4. Headless Service (ClusterIP: None)
#    No virtual IP; DNS returns pod IPs directly.
#    Required for StatefulSets and direct pod-to-pod communication.
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: headless-svc
  namespace: default
spec:
  clusterIP: None               # makes it headless
  selector:
    app: db
  ports:
    - name: db
      port: 5432
      targetPort: 5432

# DNS for headless:
#   headless-svc.default.svc.cluster.local → list of ALL pod IPs
#   pod-0.headless-svc.default.svc.cluster.local → specific pod (StatefulSet)

---
# ------------------------------------------------------------
# 5. ClusterIP without selector – manual Endpoints
#    Use to create a service pointing to an external resource (on-prem DB, legacy system) under a k8s DNS name.
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: external-db-svc
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  # No selector! We define Endpoints manually below.

---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-db-svc      # must match the Service name
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.1.100    # external IP (on-prem DB server)
    ports:
      - port: 5432

---
# ------------------------------------------------------------
# 6. EndpointSlice (modern API, k8s 1.21+ default)
#    Replaces Endpoints for large clusters (>100 endpoints).
#    Created automatically by the controller; shown here for reference.
# ------------------------------------------------------------
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: external-db-svc-slice
  namespace: default
  labels:
    kubernetes.io/service-name: external-db-svc
addressType: IPv4
ports:
  - name: db
    protocol: TCP
    port: 5432
endpoints:
  - addresses:
      - "192.168.1.100"
    conditions:
      ready: true

---
# ------------------------------------------------------------
# Useful kubectl commands for ClusterIP
# ------------------------------------------------------------
# List services:
#   kubectl get services
#   kubectl get svc

# Describe service (shows Endpoints):
#   kubectl describe svc backend-svc

# Test from inside the cluster:
#   kubectl run test-pod --image=busybox:1.36 --restart=Never -it --rm \
#     -- wget -qO- http://backend-svc.default.svc.cluster.local

# Check endpoints (pods backing the service):
#   kubectl get endpoints backend-svc

# Port-forward to a service locally:
#   kubectl port-forward svc/backend-svc 8080:80
