# ============================================================
# Kubernetes DaemonSet - Learning Reference
# ============================================================
# A DaemonSet ensures that ONE copy of a Pod runs on EVERY
# (or a subset of) node(s) in the cluster.
#
# Typical use-cases:
#   - Log collectors     (Fluentd, Filebeat)
#   - Node monitoring    (Prometheus node-exporter, Datadog agent)
#   - Network plug-ins   (Calico, Cilium agent)
#   - Storage daemons    (Ceph, GlusterFS)
#
# New nodes joining the cluster automatically get the DaemonSet pod.
# Deleted nodes have their pod garbage-collected automatically.
# ============================================================


# ------------------------------------------------------------
# 1. Basic DaemonSet – runs on every node
# ------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: kube-system          # system-facing daemons usually go here
  labels:
    app: log-collector
    tier: logging
spec:
  selector:
    matchLabels:
      app: log-collector
  # Update strategy for DaemonSet (same options as Deployment)
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1           # update one node at a time
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      # Access host filesystem to read node-level logs
      volumes:
        - name: varlog
          hostPath:
            path: /var/log        # host path
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
      containers:
        - name: fluentd
          image: fluent/fluentd:v1.16-1
          resources:
            requests:
              cpu: "100m"
              memory: "200Mi"
            limits:
              cpu: "200m"
              memory: "400Mi"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          env:
            - name: FLUENTD_CONF
              value: "fluent.conf"
      # DaemonSet pods often need to run on control-plane nodes too
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 30

---
# ------------------------------------------------------------
# 2. DaemonSet – Node Monitoring (Prometheus node-exporter)
#    HostNetwork + HostPID needed for full node metrics.
# ------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  selector:
    matchLabels:
      app: node-exporter
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: node-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      hostNetwork: true            # use the node's network namespace
      hostPID: true                # see processes on the host
      hostIPC: false
      # Do not share the service account token with node-exporter (least privilege)
      automountServiceAccountToken: false
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          args:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--path.rootfs=/host/root"
            - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100       # expose on node IP directly (hostNetwork)
          resources:
            requests:
              cpu: "102m"
              memory: "180Mi"
            limits:
              cpu: "250m"
              memory: "300Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534       # nobody
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      tolerations:
        - operator: Exists         # tolerate ALL taints → schedule on every node
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /

---
# ------------------------------------------------------------
# 3. DaemonSet – Run only on SPECIFIC nodes using nodeSelector
#    Only nodes labelled  disk=ssd  will receive this pod.
# ------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ssd-disk-monitor
  namespace: default
  labels:
    app: ssd-disk-monitor
spec:
  selector:
    matchLabels:
      app: ssd-disk-monitor
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ssd-disk-monitor
    spec:
      # Only schedule on nodes with this label
      nodeSelector:
        disk: ssd
      containers:
        - name: disk-monitor
          image: busybox:1.36
          command: ["sh", "-c", "while true; do df -h /data; sleep 60; done"]
          volumeMounts:
            - name: data-vol
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: data-vol
          hostPath:
            path: /mnt/ssd-data

---
# ------------------------------------------------------------
# 4. DaemonSet – Run only on SPECIFIC nodes using Node Affinity
#    More expressive than nodeSelector.
# ------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-plugin
  namespace: kube-system
  labels:
    app: gpu-plugin
spec:
  selector:
    matchLabels:
      app: gpu-plugin
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: gpu-plugin
    spec:
      affinity:
        nodeAffinity:
          # HARD rule: only nodes that have a GPU label
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: accelerator
                    operator: In
                    values:
                      - gpu
                      - nvidia-tesla-k80
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: gpu-plugin
          image: nvidia/k8s-device-plugin:v0.14.3
          securityContext:
            privileged: true       # required to access GPU devices
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins

---
# ------------------------------------------------------------
# Useful kubectl commands for DaemonSets
# ------------------------------------------------------------
# kubectl apply -f DaemonSet.yaml
# kubectl get daemonsets -A
# kubectl describe daemonset log-collector -n kube-system
# kubectl rollout status daemonset/log-collector -n kube-system
# kubectl rollout history daemonset/log-collector -n kube-system
# kubectl rollout undo daemonset/log-collector -n kube-system
# kubectl delete daemonset log-collector -n kube-system
#
# Label a node to target the nodeSelector DaemonSet:
#   kubectl label node <node-name> disk=ssd
