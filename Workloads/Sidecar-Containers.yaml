# ============================================================
# Kubernetes Sidecar Containers - Learning Reference
# ============================================================
# A Sidecar is an additional container in a Pod that augments
# the main application container without changing its code.
#
# Common sidecar patterns:
#   1. Log shipper     – collect & forward logs (Fluentd, Filebeat)
#   2. Proxy / mesh    – service mesh (Envoy/Istio, Linkerd)
#   3. Sync agent      – sync config/secrets from external sources
#   4. Monitoring      – expose custom metrics
#   5. Adapter         – normalise app output for another system
#   6. Ambassador      – proxy outbound traffic (rate-limit, auth)
#
# Native Sidecar (k8s 1.29+ GA):
#   Define a sidecar under initContainers with
#   restartPolicy: Always – it starts before app containers and
#   is kept running for the lifetime of the pod.
# ============================================================


# ------------------------------------------------------------
# 1. Log Shipper Sidecar Pattern
#    App writes logs to a shared emptyDir volume.
#    Fluentd reads and ships logs to Elasticsearch.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: app-with-log-shipper
  namespace: default
  labels:
    app: myapp
spec:
  volumes:
    - name: shared-logs
      emptyDir: {}            # ephemeral volume shared between containers

  containers:
    # --- Main application container ---
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            echo "$(date) INFO Request handled successfully" >> /var/log/app/app.log
            sleep 5
          done
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/app
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"

    # --- Sidecar: log shipper ---
    - name: log-shipper
      image: fluent/fluentd:v1.16-1
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/app
          readOnly: true
      env:
        - name: FLUENT_ELASTICSEARCH_HOST
          value: "elasticsearch.monitoring.svc.cluster.local"
        - name: FLUENT_ELASTICSEARCH_PORT
          value: "9200"
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

---
# ------------------------------------------------------------
# 2. Envoy Proxy Sidecar
#    Intercepts all inbound/outbound traffic for the app.
#    This is the pattern used by Istio service mesh.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: app-with-envoy
  namespace: default
  labels:
    app: myapp-envoy
  annotations:
    sidecar.istio.io/inject: "false"    # disable auto-injection since we add manually
spec:
  containers:
    # --- Main application container ---
    - name: app
      image: my-app:1.0.0
      ports:
        - containerPort: 8080
      env:
        # Tell app to only bind localhost; Envoy handles external traffic
        - name: SERVER_HOST
          value: "127.0.0.1"
        - name: SERVER_PORT
          value: "8080"
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    # --- Sidecar: Envoy proxy ---
    - name: envoy
      image: envoyproxy/envoy:v1.29.1
      args:
        - "-c"
        - "/etc/envoy/envoy.yaml"
        - "--log-level"
        - "info"
      ports:
        - name: http
          containerPort: 10000      # Envoy listener port (external traffic)
        - name: admin
          containerPort: 9901       # Envoy admin interface
      volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

  volumes:
    - name: envoy-config
      configMap:
        name: envoy-config          # ConfigMap containing envoy.yaml

---
# ------------------------------------------------------------
# 3. Config Sync Sidecar
#    Periodically pulls updated config from a remote source
#    and writes it to a shared volume for the main container.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: app-with-config-sync
  namespace: default
  labels:
    app: myapp-configsync
spec:
  volumes:
    - name: config-volume
      emptyDir: {}

  initContainers:
    # Pull config once on startup before app starts
    - name: config-init
      image: curlimages/curl:8.6.0
      command:
        - sh
        - -c
        - |
          curl -sSf http://config-server/api/v1/config/myapp \
            -o /config/app.json
          echo "Initial config loaded."
      volumeMounts:
        - name: config-volume
          mountPath: /config
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

  containers:
    # --- Main application container ---
    - name: app
      image: my-app:1.0.0
      volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      resources:
        requests:
          cpu: "200m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

    # --- Sidecar: config sync (polls every 30s) ---
    - name: config-sync
      image: curlimages/curl:8.6.0
      command:
        - sh
        - -c
        - |
          while true; do
            echo "Syncing config..."
            curl -sSf http://config-server/api/v1/config/myapp \
              -o /config/app.json.tmp \
              && mv /config/app.json.tmp /config/app.json
            echo "Config synced at $(date)"
            sleep 30
          done
      volumeMounts:
        - name: config-volume
          mountPath: /config
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

---
# ------------------------------------------------------------
# 4. Metrics Adapter Sidecar (Prometheus exporter)
#    Converts proprietary app metrics format to Prometheus.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: app-with-metrics-adapter
  namespace: default
  labels:
    app: myapp-metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9113"   # sidecar exporter port
    prometheus.io/path: "/metrics"
spec:
  containers:
    # --- Main application (nginx) ---
    - name: nginx
      image: nginx:1.25.3
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-status
          mountPath: /etc/nginx/conf.d/status.conf
          subPath: status.conf
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"

    # --- Sidecar: nginx-prometheus-exporter ---
    - name: nginx-exporter
      image: nginx/nginx-prometheus-exporter:1.1.0
      args:
        - "-nginx.scrape-uri=http://127.0.0.1:8080/nginx_status"
      ports:
        - name: metrics
          containerPort: 9113
      resources:
        requests:
          cpu: "30m"
          memory: "32Mi"
        limits:
          cpu: "60m"
          memory: "64Mi"

  volumes:
    - name: nginx-status
      configMap:
        name: nginx-status-config

---
# ------------------------------------------------------------
# 5. Native Sidecar Container (Kubernetes 1.29+ GA)
#    Defined as an initContainer with restartPolicy: Always.
#    Starts BEFORE app containers, stays alive for pod lifetime,
#    and is stopped AFTER app containers exit.
#    Ideal for log agents and proxies that must outlive the app.
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: native-sidecar-demo
  namespace: default
  labels:
    app: native-sidecar
spec:
  # Native sidecar goes inside initContainers with restartPolicy: Always
  initContainers:
    - name: log-agent
      image: fluent/fluentd:v1.16-1
      restartPolicy: Always        # KEY: makes this a native sidecar
      volumeMounts:
        - name: log-dir
          mountPath: /var/log/app
          readOnly: true
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          for i in $(seq 1 10); do
            echo "Log line $i" >> /var/log/app/app.log
            sleep 2
          done
          echo "App finished."
      volumeMounts:
        - name: log-dir
          mountPath: /var/log/app
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

  volumes:
    - name: log-dir
      emptyDir: {}

  restartPolicy: Never

---
# ------------------------------------------------------------
# Useful kubectl commands for Sidecars
# ------------------------------------------------------------
# kubectl apply -f Sidecar-Containers.yaml
# kubectl get pods
# kubectl describe pod app-with-log-shipper
#
# View logs of the sidecar container specifically:
#   kubectl logs app-with-log-shipper -c log-shipper
#   kubectl logs app-with-log-shipper -c app
#
# Exec into the sidecar:
#   kubectl exec -it app-with-log-shipper -c log-shipper -- sh
#
# View all containers in a pod:
#   kubectl get pod app-with-log-shipper \
#     -o jsonpath='{.spec.containers[*].name}'
