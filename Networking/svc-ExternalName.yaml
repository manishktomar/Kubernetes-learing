# ============================================================
# Kubernetes Service: ExternalName - Learning Reference
# ============================================================
# ExternalName maps a Service to a DNS name (CNAME alias).
# No proxying or load balancing happens; the DNS resolution
# returns the external hostname directly to the client.
#
# Traffic flow:
#   Pod looks up <service-name>  →
#   kube-dns returns CNAME <externalName>  →
#   Pod connects to external host directly
#
# Use ExternalName for:
#   - Abstracting external services behind a k8s DNS name
#   - Migration: swap from external DB to in-cluster DB by changing
#     the Service type without touching application configuration
#   - Multi-environment config (dev points to test DB, prod to prod DB)
#
# Limitations:
#   - Does NOT work with HTTPS/TLS (no SNI injection)
#   - No kube-proxy, no load balancing, no NodePort
#   - Requires working DNS resolution from pods to the external host
# ============================================================


# ------------------------------------------------------------
# 1. ExternalName – point to an external database
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: default
  labels:
    app: postgres
spec:
  type: ExternalName
  externalName: prod-db.example.com    # external DNS name (CNAME target)
  # No selector, no ports (optional for documentation)
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP

# Pods connect to: postgres-svc.default.svc.cluster.local
# which resolves via CNAME to: prod-db.example.com

---
# ------------------------------------------------------------
# 2. ExternalName – point to an AWS RDS endpoint
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: rds-svc
  namespace: production
spec:
  type: ExternalName
  externalName: mydb.cluster-abc123.us-east-1.rds.amazonaws.com

---
# ------------------------------------------------------------
# 3. ExternalName – point to Azure SQL
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: azure-sql-svc
  namespace: default
spec:
  type: ExternalName
  externalName: myserver.database.windows.net

---
# ------------------------------------------------------------
# 4. ExternalName – point to a service in ANOTHER namespace
#    Useful when a cross-namespace ClusterIP is needed.
#    (Alternatively use: <svc>.<ns>.svc.cluster.local directly)
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: auth-svc-alias
  namespace: frontend           # this service lives in the 'frontend' ns
spec:
  type: ExternalName
  # Points to the auth service in the 'backend' namespace
  externalName: auth-svc.backend.svc.cluster.local

---
# ------------------------------------------------------------
# 5. Migration pattern: start with ExternalName, switch to ClusterIP
#
# Phase 1 (external service):
#
#   apiVersion: v1
#   kind: Service
#   metadata:
#     name: redis
#   spec:
#     type: ExternalName
#     externalName: redis.external.example.com
#
# Phase 2 (migrate to in-cluster Redis):
#   Deploy Redis in the cluster, then:
#
#   apiVersion: v1
#   kind: Service
#   metadata:
#     name: redis
#   spec:
#     type: ClusterIP          # same name, apps need zero changes
#     selector:
#       app: redis
#     ports:
#       - port: 6379
#         targetPort: 6379
# ------------------------------------------------------------

---
# ------------------------------------------------------------
# 6. Pod consuming the ExternalName Service
# ------------------------------------------------------------
apiVersion: v1
kind: Pod
metadata:
  name: app-using-external
  namespace: default
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          nslookup postgres-svc
          # resolves to: prod-db.example.com
          sleep 3600
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

---
# ------------------------------------------------------------
# Useful kubectl commands for ExternalName
# ------------------------------------------------------------
# Apply:
#   kubectl apply -f svc-ExternalName.yaml
#
# Verify CNAME resolution from inside the cluster:
#   kubectl run dns-test --image=busybox:1.36 --restart=Never -it --rm \
#     -- nslookup postgres-svc.default.svc.cluster.local
#   # Should show CNAME answer pointing to the externalName
#
# Describe service:
#   kubectl describe svc postgres-svc
#
# Update externalName (e.g., to point to new host):
#   kubectl patch svc postgres-svc -p '{"spec":{"externalName":"new-db.example.com"}}'
