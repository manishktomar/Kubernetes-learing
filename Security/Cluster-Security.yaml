#   [ ] Namespace-scoped roles preferred over cluster roles
#   [ ] Regular RBAC audit (rbac-police, rbac-lookup tools)
#   [ ] Break-glass procedure documented and time-limited
#
# etcd:
#   [ ] mTLS for client and peer connections
#   [ ] Encryption at rest (KMS preferred)
#   [ ] Access restricted to API server only
#   [ ] Regular automated backups
#   [ ] Runs on dedicated nodes
#
# Secrets:
#   [ ] External secrets manager (Vault, AWS SM, Azure KV)
#   [ ] No secrets in source code or CI/CD variables
#   [ ] Sealed Secrets for GitOps workflows
#   [ ] Secret rotation policy enforced
#
# Network:
