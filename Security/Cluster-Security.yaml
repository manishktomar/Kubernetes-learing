kind: FelixConfiguration
metadata:
  name: default
spec:
  wireguardEnabled: true              # Enable WireGuard for pod traffic
  wireguardEnabledV6: true            # IPv6 support
  wireguardListeningPort: 51820
  # All pod-to-pod traffic is now encrypted at L3
  # No application changes needed

