# ############################################################
# SECTION 15: Kubernetes Upgrade Security Policy
# ############################################################
# Secure cluster upgrade process.
#
# Pre-upgrade checklist:
#   [ ] Review release notes for security fixes
#   [ ] Check deprecated API usage: kubectl get --raw /metrics | grep apiserver_requested_deprecated_apis
#   [ ] Run: kubectl api-resources --verbs=list -o name | xargs -n1 kubectl get --show-kind --ignore-not-found -A
#   [ ] Backup etcd: etcdctl snapshot save backup.db
#   [ ] Backup cluster state: velero backup create pre-upgrade-$(date +%Y%m%d)
#   [ ] Test upgrade in staging first
#   [ ] Verify PSA labels are compatible with new version
#   [ ] Check admission webhook compatibility
#   [ ] Review NetworkPolicy API changes
#
# Upgrade order:
#   1. etcd (if self-managed)
#   2. kube-apiserver
#   3. kube-controller-manager
#   4. kube-scheduler
#   5. kubelet (one node at a time)
#   6. kube-proxy
#
# Post-upgrade verification:
#   kubectl get nodes    # All nodes Ready
#   kubectl get pods -A  # No CrashLoopBackOff
#   kubectl get cs       # Component statuses healthy
#   kubectl cluster-info
#   kubectl auth can-i create pods --all-namespaces  # RBAC working

---
# ############################################################
# SECTION 16: Security Contexts for Control Plane Components
# ############################################################
# Even control plane pods should follow security best practices.

# 16.1 Hardened kube-proxy DaemonSet (example)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-proxy-hardened
  namespace: kube-system
spec:
  selector:
    matchLabels:
      k8s-app: kube-proxy
  template:
    metadata:
      labels:
        k8s-app: kube-proxy
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: kube-proxy
      hostNetwork: true                # Required for kube-proxy
      tolerations:
        - operator: Exists
      containers:
        - name: kube-proxy
          image: registry.k8s.io/kube-proxy:v1.30.0
          command:
            - /usr/local/bin/kube-proxy
            - --config=/var/lib/kube-proxy/config.conf
            - --hostname-override=$(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            capabilities:
              add: ["NET_ADMIN", "SYS_RESOURCE"]
              drop: ["ALL"]
          volumeMounts:
            - name: kube-proxy-config
              mountPath: /var/lib/kube-proxy
            - name: xtables-lock
              mountPath: /run/xtables.lock
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: kube-proxy-config
          configMap:
            name: kube-proxy
        - name: xtables-lock
          hostPath:
            path: /run/xtables.lock
            type: FileOrCreate

