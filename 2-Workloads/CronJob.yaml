# ============================================================
# Kubernetes Job & CronJob - Learning Reference
# ============================================================
# Job:
#   Runs one or more Pods to completion (finite task).
#   Guarantees that a specified number of Pods complete successfully.
#   Use-cases: data migrations, batch processing, one-off scripts.
#
# CronJob:
#   Creates Jobs on a Cron schedule (cron expression in UTC).
#   Use-cases: nightly reports, periodic DB backups, cache warming.
#
# Cron format: minute  hour  day-of-month  month  day-of-week
#   "0 2 * * *"  = every day at 02:00 UTC
#   "*/5 * * * *" = every 5 minutes
#   "0 0 1 * *"  = midnight on the 1st of every month
# ============================================================


# ------------------------------------------------------------
# 1. Simple Job – run a script once to completion
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: default
  labels:
    app: db-migration
    type: job
spec:
  # How many successful completions are required
  completions: 1
  # How many pods run in parallel
  parallelism: 1
  # Seconds before the job is considered failed (optional)
  activeDeadlineSeconds: 300
  # Number of retries before marking the Job as failed
  backoffLimit: 3
  # Seconds after completion before the Job is auto-deleted (k8s 1.21+)
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: OnFailure     # must be OnFailure or Never for Jobs
      containers:
        - name: migration
          image: flyway/flyway:10.8.1
          args:
            - "-url=jdbc:postgresql://postgres-svc:5432/appdb"
            - "-schemas=public"
            - "migrate"
          env:
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"

---
# ------------------------------------------------------------
# 2. Parallel Job – work queue processing
#    Run 5 completions with max 2 pods at a time.
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: image-processor
  namespace: default
  labels:
    app: image-processor
spec:
  completions: 5          # total successful pod completions needed
  parallelism: 2          # at most 2 pods running simultaneously
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: image-processor
    spec:
      restartPolicy: Never
      containers:
        - name: processor
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Processing batch item $(hostname)..."
              sleep 10
              echo "Done."
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
# ------------------------------------------------------------
# 3. Indexed Job (k8s 1.21+)
#    Each pod gets a unique index via JOB_COMPLETION_INDEX env var.
#    Useful for shard-based parallel processing.
# ------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: shard-processor
  namespace: default
spec:
  completions: 4
  parallelism: 4
  completionMode: Indexed     # pods get index 0, 1, 2, 3
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: shard-worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Processing shard index: $JOB_COMPLETION_INDEX"
              sleep 5
              echo "Shard $JOB_COMPLETION_INDEX complete."
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
# ------------------------------------------------------------
# 4. Basic CronJob – nightly database backup at 02:00 UTC
# ------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: default
  labels:
    app: db-backup
spec:
  schedule: "0 2 * * *"         # every day at 02:00 UTC
  timeZone: "UTC"                # k8s 1.27+: set timezone explicitly
  # How many successful job records to keep
  successfulJobsHistoryLimit: 3
  # How many failed job records to keep
  failedJobsHistoryLimit: 1
  # What to do if a job is still running when the next scheduled slot arrives
  # Allow: run both   Forbid: skip new   Replace: cancel old & start new
  concurrencyPolicy: Forbid
  # Deadline in seconds for starting the job (if controller misses the time)
  startingDeadlineSeconds: 120
  # Suspend the CronJob (disable scheduling) without deleting it
  suspend: false
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400   # keep completed job for 24h
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: db-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16.2-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-secret
                      key: password
              command:
                - sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  pg_dump -h postgres-svc -U postgres appdb \
                    | gzip > /backup/appdb_${TIMESTAMP}.sql.gz
                  echo "Backup completed: appdb_${TIMESTAMP}.sql.gz"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc       # must exist

---
# ------------------------------------------------------------
# 5. CronJob – run every 5 minutes (health check / cache warm)
# ------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cache-warmer
  namespace: default
  labels:
    app: cache-warmer
spec:
  schedule: "*/5 * * * *"       # every 5 minutes
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app: cache-warmer
        spec:
          restartPolicy: Never
          containers:
            - name: warmer
              image: curlimages/curl:8.6.0
              command:
                - sh
                - -c
                - |
                  echo "Warming cache..."
                  curl -sf http://my-api-svc/api/v1/cache/warm
                  echo "Cache warmed."
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"

---
# ------------------------------------------------------------
# 6. CronJob – monthly report generation (1st of each month)
# ------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: monthly-report
  namespace: default
  labels:
    app: monthly-report
spec:
  schedule: "0 0 1 * *"         # midnight UTC on the 1st of each month
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800   # keep for 7 days
      template:
        metadata:
          labels:
            app: monthly-report
        spec:
          restartPolicy: OnFailure
          serviceAccountName: report-generator-sa   # dedicated SA (least privilege)
          containers:
            - name: report
              image: python:3.12-slim
              command:
                - python
                - /scripts/generate_report.py
              env:
                - name: REPORT_MONTH
                  value: "auto"          # script reads the previous month
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: report-config
                      key: s3-bucket
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
          volumes:
            - name: scripts
              configMap:
                name: report-scripts

---
# ------------------------------------------------------------
# Useful kubectl commands for Jobs and CronJobs
# ------------------------------------------------------------
# kubectl apply -f CronJob.yaml
#
# Jobs:
#   kubectl get jobs
#   kubectl describe job db-migration
#   kubectl logs job/db-migration
#   kubectl wait --for=condition=complete job/db-migration --timeout=120s
#   kubectl delete job db-migration
#
# CronJobs:
#   kubectl get cronjobs
#   kubectl describe cronjob db-backup
#   # Manually trigger a CronJob immediately:
#   kubectl create job --from=cronjob/db-backup db-backup-manual-001
#   # Suspend a CronJob:
#   kubectl patch cronjob db-backup -p '{"spec":{"suspend":true}}'
#   # Resume a CronJob:
#   kubectl patch cronjob db-backup -p '{"spec":{"suspend":false}}'
#   kubectl delete cronjob db-backup
