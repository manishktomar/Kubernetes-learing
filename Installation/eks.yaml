# ============================================================
# Amazon EKS (Elastic Kubernetes Service) - Learning Reference
# ============================================================
# EKS is AWS's fully managed Kubernetes service.
#
# Ways to create an EKS cluster:
#   1. eksctl  (recommended CLI tool)
#   2. AWS Console
#   3. Terraform / Pulumi / CDK
#   4. AWS CloudFormation
#
# Prerequisites
#   - AWS CLI installed & configured (aws configure)
#   - eksctl installed
#   - kubectl installed
# ============================================================


# ============================================================
# TOOL INSTALLATION
# ============================================================
# Install AWS CLI v2:
#   curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
#   unzip awscliv2.zip && sudo ./aws/install
#   aws --version
#
# Configure AWS CLI:
#   aws configure
#   # AWS Access Key ID:     <your-key>
#   # AWS Secret Access Key: <your-secret>
#   # Default region:        us-east-1
#   # Default output format: json
#
# Install eksctl:
#   curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
#   sudo mv /tmp/eksctl /usr/local/bin
#   eksctl version
# ============================================================


# ============================================================
# eksctl ClusterConfig – declarative cluster definition
# ============================================================
# Apply with: eksctl create cluster -f eks-cluster.yaml
# ============================================================
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: learning-cluster
  region: us-east-1
  version: "1.29"              # Kubernetes version
  tags:
    environment: learning
    owner: devops-team

# IAM settings
iam:
  withOIDC: true              # enable IRSA (IAM Roles for Service Accounts)
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      wellKnownPolicies:
        awsLoadBalancerController: true
    - metadata:
        name: cluster-autoscaler
        namespace: kube-system
      wellKnownPolicies:
        autoScaler: true
    - metadata:
        name: ebs-csi-controller-sa
        namespace: kube-system
      wellKnownPolicies:
        ebsCSIController: true           # required for EBS PersistentVolumes

# VPC / networking
vpc:
  cidr: 10.0.0.0/16
  clusterEndpoints:
    publicAccess: true
    privateAccess: true
  nat:
    gateway: HighlyAvailable           # one NAT gateway per AZ

# Managed node groups
managedNodeGroups:
  # General-purpose nodes
  - name: ng-general
    instanceType: t3.medium
    minSize: 2
    maxSize: 6
    desiredCapacity: 3
    volumeSize: 50                     # GB, root disk
    volumeType: gp3
    privateNetworking: true            # place nodes in private subnets
    amiFamily: AmazonLinux2023
    labels:
      role: general
    tags:
      nodegroup: general
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  # Spot instance nodes for cost savings
  - name: ng-spot
    instanceTypes: ["t3.large", "t3a.large", "m5.large"]
    spot: true
    minSize: 0
    maxSize: 10
    desiredCapacity: 2
    privateNetworking: true
    labels:
      role: spot
      lifecycle: spot
    taints:
      - key: spot
        value: "true"
        effect: NoSchedule

# Add-ons managed by EKS
addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
    serviceAccountRoleARN:       # filled by eksctl via IRSA
      arn:aws:iam::123456789012:role/ebs-csi-role

# CloudWatch logging
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler


# ============================================================
# COMMON eksctl COMMANDS
# ============================================================
# Create cluster from config
#   eksctl create cluster -f eks.yaml
#
# Create simple cluster (CLI flags only)
#   eksctl create cluster \
#     --name learning-cluster \
#     --region us-east-1 \
#     --nodegroup-name standard-workers \
#     --node-type t3.medium \
#     --nodes 3
#
# Update kubeconfig
#   aws eks update-kubeconfig --region us-east-1 --name learning-cluster
#
# List clusters
#   eksctl get cluster
#   aws eks list-clusters --region us-east-1
#
# Scale node group
#   eksctl scale nodegroup --cluster=learning-cluster --nodes=5 ng-general
#
# Upgrade Kubernetes version
#   eksctl upgrade cluster --name=learning-cluster --approve
#   eksctl upgrade nodegroup --name=ng-general --cluster=learning-cluster
#
# Delete cluster
#   eksctl delete cluster --name learning-cluster
#
# Get nodes
#   kubectl get nodes -o wide
#
# Add the AWS Load Balancer Controller (for Ingress)
#   helm repo add eks https://aws.github.io/eks-charts
#   helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     -n kube-system \
#     --set clusterName=learning-cluster \
#     --set serviceAccount.create=false \
#     --set serviceAccount.name=aws-load-balancer-controller
#
# Install Cluster Autoscaler
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/autoscaler/master/cluster-autoscaler/cloudprovider/aws/examples/cluster-autoscaler-autodiscover.yaml
