# ============================================================
# Kubernetes Local Installation - Learning Reference
# ============================================================
# Options for running Kubernetes locally:
#   1. Minikube  – single-node cluster, most popular for learning
#   2. kind      – Kubernetes IN Docker; multi-node support
#   3. k3s       – lightweight production-grade K8s (Rancher)
#   4. k3d       – k3s inside Docker (fast multi-node)
# ============================================================


# ============================================================
# 1. MINIKUBE
# ============================================================
# Install (Linux)
#   curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
#   sudo install minikube-linux-amd64 /usr/local/bin/minikube
#
# Install kubectl
#   curl -LO "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
#   sudo install kubectl /usr/local/bin/kubectl
#
# Start cluster
#   minikube start
#   minikube start --cpus=4 --memory=8192 --disk-size=40g
#   minikube start --driver=docker          # use Docker as driver
#   minikube start --kubernetes-version=v1.29.0
#
# Common commands
#   minikube status
#   minikube stop
#   minikube delete
#   minikube dashboard                      # open Kubernetes dashboard
#   minikube addons list
#   minikube addons enable ingress          # enable NGINX Ingress
#   minikube addons enable metrics-server
#   minikube tunnel                         # expose LoadBalancer services
#   minikube service <svc-name> --url       # get URL for NodePort service
#   eval $(minikube docker-env)             # use minikube's Docker daemon
#
# Multi-node minikube (1.25+)
#   minikube start --nodes=3 --cni=calico
#   kubectl get nodes
# ============================================================


# ============================================================
# 2. KIND (Kubernetes IN Docker)
# ============================================================
# Install
#   curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
#   chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
#
# Single-node cluster
#   kind create cluster
#   kind create cluster --name dev
#
# Delete cluster
#   kind delete cluster
#   kind delete cluster --name dev
# ============================================================


# ============================================================
# kind useful commands after cluster creation
#   kind get clusters
#   kind get nodes --name learning-cluster
#   kubectl cluster-info --context kind-learning-cluster
#   kind load docker-image my-image:tag --name learning-cluster
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
# ============================================================


# ============================================================
# 3. K3S (Lightweight Kubernetes)
# ============================================================
# Single-node install (server)
#   curl -sfL https://get.k3s.io | sh -
#   sudo systemctl status k3s
#   sudo kubectl get nodes
#
# Get the kubeconfig
#   sudo cat /etc/rancher/k3s/k3s.yaml
#   export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
#
# Add a worker node (run on worker after getting node-token from server)
#   NODE_TOKEN=$(sudo cat /var/lib/rancher/k3s/server/node-token)   # on server
#   curl -sfL https://get.k3s.io | K3S_URL=https://<server-ip>:6443 K3S_TOKEN=$NODE_TOKEN sh -
#
# Uninstall k3s
#   /usr/local/bin/k3s-uninstall.sh           # server
#   /usr/local/bin/k3s-agent-uninstall.sh     # agent
# ============================================================


# ============================================================
# 4. K3D (k3s in Docker)
# ============================================================
# Install
#   curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
#
# Create single-node cluster
#   k3d cluster create mycluster
#
# Create multi-node cluster exposing port 80/443
#   k3d cluster create mycluster \
#     --servers 1 --agents 2 \
#     -p "80:80@loadbalancer" \
#     -p "443:443@loadbalancer"
#
# Delete cluster
#   k3d cluster delete mycluster
#
# List clusters
#   k3d cluster list
# ============================================================


# ============================================================
# Kubectl Cheat Sheet (works with any local cluster)
# ============================================================
# Context management
#   kubectl config get-contexts
#   kubectl config current-context
#   kubectl config use-context <context-name>
#   kubectl config set-context --current --namespace=dev
#
# Cluster info
#   kubectl cluster-info
#   kubectl get nodes
#   kubectl get nodes -o wide
#   kubectl describe node <node-name>
#
# Namespaces
#   kubectl get namespaces
#   kubectl create namespace dev
#
# Resources
#   kubectl get all -n default
#   kubectl api-resources          # list all resource types
#   kubectl explain pod.spec       # inline API documentation
#
# Apply / delete
#   kubectl apply -f <file>.yaml
#   kubectl delete -f <file>.yaml
#   kubectl apply -k <kustomize-dir>
