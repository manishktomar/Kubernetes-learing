# ============================================================
# Kubernetes StorageClasses - Learning Reference
# ============================================================
# A StorageClass defines "classes" of storage with specific
# performance characteristics and provisioner backends.
# When a PVC references a StorageClass, the provisioner
# creates the underlying storage (EBS volume, Azure Disk, etc.)
# automatically — this is called Dynamic Provisioning.
#
# Key fields:
#   provisioner       – the plugin that creates the storage
#   parameters        – provisioner-specific options
#   reclaimPolicy     – Retain or Delete (default: Delete)
#   volumeBindingMode – Immediate or WaitForFirstConsumer
#   allowVolumeExpansion – whether PVCs can grow
#   mountOptions      – extra options passed to mount
# ============================================================


# ------------------------------------------------------------
# 1. Default StorageClass (standard local for minikube/kind)
# ------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  annotations:
    # Mark as cluster default – used when PVC has no storageClassName
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer   # wait until pod is scheduled
allowVolumeExpansion: true

---
# ------------------------------------------------------------
# 2. AWS EBS gp3 StorageClass (recommended for AWS)
# ------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
provisioner: ebs.csi.aws.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: gp3
  iops: "3000"               # gp3: 3000-16000 IOPS
  throughput: "125"          # gp3: 125-1000 MB/s
  encrypted: "true"          # encrypt the EBS volume at rest
  # kmsKeyId: arn:aws:kms:...  # optional: custom KMS key

---
# AWS EBS io2 for high-performance databases
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: io2-high-perf
provisioner: ebs.csi.aws.com
reclaimPolicy: Retain         # Retain for databases (prevent accidental deletion)
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: io2
  iops: "10000"
  encrypted: "true"

---
# ------------------------------------------------------------
# 3. Azure Disk StorageClasses
# ------------------------------------------------------------
# Standard (HDD)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: managed-standard
provisioner: disk.csi.azure.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  skuName: Standard_LRS
  kind: Managed

---
# Premium SSD
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: managed-premium
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: disk.csi.azure.com
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  skuName: Premium_LRS
  kind: Managed
  cachingMode: ReadOnly

---
# Azure Files (ReadWriteMany)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azure-files
provisioner: file.csi.azure.com
reclaimPolicy: Delete
volumeBindingMode: Immediate
allowVolumeExpansion: true
parameters:
  skuName: Standard_LRS
  storageAccount: mystorageaccount  # optional; auto-created if omitted
mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=0
  - gid=0
  - mfsymlinks
  - cache=strict
  - actimeo=30

---
# ------------------------------------------------------------
# 4. Google GKE StorageClasses
# ------------------------------------------------------------
# Standard PD (balanced)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-rwo
provisioner: pd.csi.storage.gke.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: pd-balanced
  replication-type: none

---
# SSD pd (premium)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: premium-rwo
provisioner: pd.csi.storage.gke.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: pd-ssd
  replication-type: none

---
# ReadWriteMany via Filestore CSI
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: filestore-rwx
provisioner: filestore.csi.storage.gke.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  tier: standard
  network: default

---
# ------------------------------------------------------------
# 5. NFS StorageClass (using nfs-subdir-external-provisioner)
# ------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage
provisioner: cluster.local/nfs-subdir-external-provisioner
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: false
parameters:
  archiveOnDelete: "true"       # rename dir instead of deleting on PVC delete

---
# ------------------------------------------------------------
# 6. Local StorageClass (for local SSDs on bare-metal / on-prem)
# ------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-ssd
provisioner: kubernetes.io/no-provisioner   # no dynamic provisioning
volumeBindingMode: WaitForFirstConsumer     # bind only when pod is placed
reclaimPolicy: Delete

---
# ------------------------------------------------------------
# 7. VolumeSnapshotClass (for CSI snapshot support)
# ------------------------------------------------------------
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: csi-aws-vsc
  annotations:
    snapshot.storage.kubernetes.io/is-default-class: "true"
driver: ebs.csi.aws.com
deletionPolicy: Delete
parameters:
  csi.storage.k8s.io/snapshotter-secret-name: aws-secret
  csi.storage.k8s.io/snapshotter-secret-namespace: kube-system

---
# ------------------------------------------------------------
# volumeBindingMode comparison
# ------------------------------------------------------------
# Immediate          – PV provisioned when PVC is created; may end up
#                      on a different AZ than the pod → mount fails
# WaitForFirstConsumer – PV provisioned only when a pod using it is
#                      scheduled; ensures same-AZ placement
#
# Always use WaitForFirstConsumer for cloud block storage!

---
# ------------------------------------------------------------
# Useful kubectl commands for StorageClasses
# ------------------------------------------------------------
# List storage classes:
#   kubectl get storageclass
#   kubectl get sc             # short form
#
# Describe a storage class:
#   kubectl describe sc gp3
#
# Change the default StorageClass:
#   kubectl patch storageclass standard -p \
#     '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
#   kubectl patch storageclass gp3 -p \
#     '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
#
# Delete a StorageClass:
#   kubectl delete sc my-storage-class
